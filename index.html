    <link rel="stylesheet" crossorigin href="/Portafolio/assets/index-IlcfvhrF.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restaura la ruta después de la redirección desde 404.html
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1).split('/').slice(0, -0 || undefined).join('/') + decoded + l.hash
          );
        }
      }(window.location));
    </script>
  </body>
